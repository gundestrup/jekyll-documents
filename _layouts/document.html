---
layout: default
---

<article class="document">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="document-meta">
      <strong>Date:</strong> {{ page.date | date: "%d-%m-%Y" }}<br>
      <strong>Category:</strong> {{ page.category }}
    </p>
  </header>

  <p>
    <a class="document relative_url }}
      Download ({{ page.extension | remove: "." | upcase }})
    </a>
  </p>
</article>
